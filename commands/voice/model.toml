description = "Change voice model (.onnx)"
prompt = """
The user requested to change the voice model via the `/voice:model` command.

The argument provided by the user is: {{args}}

**AVAILABLE OPTIONS:**
- en_US-bryce-medium.onnx (English US - Male Medium - Default)
- en_US-ryan-low.onnx (English US - Male Low)
- en_US-amy-medium.onnx (English US - Female Medium)
- pt_BR-faber-medium.onnx (Portuguese Brazil - Male Medium)
- es_ES-sharvard-medium.onnx (Spanish - Male Medium)
- fr_FR-siwis-medium.onnx (French - Female Medium)
- de_DE-thorsten-medium.onnx (German - Male Medium)
- zh_CN-huayan-medium.onnx (Chinese Mandarin - Female Medium)
- ru_RU-irina-medium.onnx (Russian - Female Medium)

**DECISION PROTOCOL:**

1. **IF NO ARGUMENT ({{args}} is empty):**
   - Inform the user of the current model.
   - Present the options above using `ask_user` (type "choice").
   - **IMPORTANT:** Inform that they can download more models at: https://huggingface.co/rhasspy/piper-voices/

2. **IF ARGUMENT IS A DIRECTORY PATH:**
   - Use `ls -1 {{args}}/*.onnx` to list models.
   - Present for selection via `ask_user`.

3. **IF ARGUMENT IS A FILENAME OR ABSOLUTE PATH:**
   - Call the `mcp_voice_model` tool passing the value.

4. **AFTER SUCCESS:**
   - IMMEDIATELY call `mcp_voice_speech` with the text: "Model configured. Testing now."
   - Inform the change in chat.
"""
