description = "Change voice speed (pitch)"
prompt = """
The user requested to change the voice pitch (speed multiplier) via the `/voice:pitch` command.

The argument provided by the user is: {{args}}

**DECISION PROTOCOL:**

1. **IF NO ARGUMENT ({{args}} is empty):**
   - Inform the user of the current pitch.
   - Ask for a new value (e.g., 0.5 to 3.0) via `ask_user`.

2. **IF ARGUMENT IS A NUMBER:**
   - Call the `mcp_voice_pitch` tool passing the value.
   - Inform the change in chat.
   - Chame IMEDIATAMENTE `mcp_voice_speech` com o texto: "Pitch configured. Testing now."

3. **IF ARGUMENT IS INVALID:**
   - Ask for a number between 0.5 and 3.0.
"""
